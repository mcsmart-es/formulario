<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8"/>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>MCsmart · Contratar MCTags</title>

<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }



:root {

--navy: #1B2A4A;

--navy-mid: #243660;

--red: #E63329;

--white: #FFFFFF;

--off: #f6f7fb;

--border: #dde3ef;

--muted: #8a93a8;

--text: #1a1f2e;

--green: #16a34a;

--green-light: #f0fdf4;

}



body {

font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

background: var(--off);

color: var(--text);

min-height: 100vh;

padding: 2rem 1rem 4rem;

}



.header { text-align: center; margin-bottom: 2.5rem; }



.logo-mark {

display: inline-block;

background: var(--navy);

color: white;

font-size: 0.9rem;

font-weight: 800;

padding: 0.3rem 0.7rem;

border-radius: 4px;

letter-spacing: 0.05rem;

margin-bottom: 1.2rem;

}

.logo-mark span { color: var(--red); }



.header h1 {

font-size: clamp(1.4rem, 4vw, 2rem);

font-weight: 700;

color: var(--navy);

margin-bottom: 0.5rem;

}



.header p {

color: var(--muted);

font-size: 0.88rem;

max-width: 420px;

margin: 0 auto;

line-height: 1.6;

}



/* PROGRESS */

.progress-wrap { max-width: 580px; margin: 0 auto 2rem; }

.progress-steps { display: flex; align-items: center; justify-content: center; }



.step { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; flex: 1; }



.step-dot {

width: 28px; height: 28px; border-radius: 50%;

background: var(--border);

display: flex; align-items: center; justify-content: center;

font-size: 0.7rem; font-weight: 700; color: var(--muted);

transition: all 0.3s; position: relative; z-index: 1;

}

.step.active .step-dot { background: var(--navy); color: white; }

.step.done .step-dot { background: var(--green); color: white; }



.step-label { font-size: 0.65rem; color: var(--muted); font-weight: 500; text-align: center; white-space: nowrap; }

.step.active .step-label { color: var(--navy); font-weight: 700; }

.step.done .step-label { color: var(--green); }



.step-line { flex: 1; height: 2px; background: var(--border); margin-top: -14px; transition: background 0.3s; }

.step-line.done { background: var(--green); }



/* CARD */

.card {

background: white; border: 1px solid var(--border); border-radius: 12px;

padding: 2rem; max-width: 580px; margin: 0 auto;

box-shadow: 0 2px 16px rgba(27,42,74,0.06);

}



.section-header { margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }



.section-label {

font-size: 0.65rem; font-weight: 700; letter-spacing: 0.15rem;

text-transform: uppercase; color: var(--red); margin-bottom: 0.3rem;

}

.section-title { font-size: 1.1rem; font-weight: 700; color: var(--navy); }



/* FORM */

.form-group { margin-bottom: 1.1rem; }



label.field-label {

display: block; font-size: 0.78rem; font-weight: 600;

color: var(--navy); margin-bottom: 0.35rem;

}



.req { color: var(--red); }

.opt { color: var(--muted); font-weight: 400; font-size: 0.72rem; }



input[type="text"],

input[type="email"],

input[type="tel"],

input[type="url"],

select {

width: 100%; padding: 0.65rem 0.85rem;

border: 1.5px solid var(--border); border-radius: 8px;

font-size: 0.88rem; font-family: inherit; color: var(--text);

background: var(--off);

transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;

outline: none; -webkit-appearance: none;

}



input:focus, select:focus {

border-color: var(--navy); background: white;

box-shadow: 0 0 0 3px rgba(27,42,74,0.08);

}



input.error, select.error {

border-color: var(--red);

box-shadow: 0 0 0 3px rgba(230,51,41,0.08);

}



.error-msg { font-size: 0.72rem; color: var(--red); margin-top: 0.3rem; display: none; }

.hint { font-size: 0.72rem; color: var(--muted); margin-top: 0.3rem; line-height: 1.4; }



.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }



/* PLANES */

.planes-grid { display: flex; flex-direction: column; gap: 0.6rem; }



.plan-card {

border: 2px solid var(--border); border-radius: 10px;

padding: 1rem 1.2rem; cursor: pointer; transition: all 0.2s;

display: flex; align-items: center; gap: 1rem;

background: var(--off); position: relative;

}

.plan-card:hover { border-color: var(--navy); background: white; }

.plan-card.selected { border-color: var(--navy); background: #eef1f8; }



.plan-radio {

width: 18px; height: 18px; border-radius: 50%;

border: 2px solid var(--border); flex-shrink: 0;

transition: all 0.2s; display: flex; align-items: center; justify-content: center;

}

.plan-card.selected .plan-radio { border-color: var(--navy); background: var(--navy); }

.plan-card.selected .plan-radio::after {

content: ''; width: 6px; height: 6px; border-radius: 50%; background: white;

}



.plan-info { flex: 1; }

.plan-name { font-size: 0.9rem; font-weight: 700; color: var(--navy); margin-bottom: 0.1rem; }

.plan-tags-count { font-size: 0.72rem; color: var(--muted); font-weight: 500; }



.plan-precio { text-align: right; flex-shrink: 0; }

.plan-setup { font-size: 0.78rem; color: var(--muted); display: block; }

.plan-mensual { font-size: 1rem; font-weight: 800; color: var(--navy); display: block; }

.plan-mensual span { font-size: 0.7rem; font-weight: 500; color: var(--muted); }



.plan-popular-badge {

position: absolute; top: 0.5rem; right: 0.7rem;

background: var(--navy); color: white;

font-size: 0.6rem; font-weight: 700;

padding: 0.15rem 0.5rem; border-radius: 8px;

text-transform: uppercase; letter-spacing: 0.05rem;

}



/* RESUMEN */

.resumen-box {

background: var(--off); border: 1px solid var(--border);

border-radius: 10px; padding: 1rem 1.2rem; margin-bottom: 1rem;

}

.resumen-label {

font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12rem;

text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem;

}

.resumen-plan { font-size: 1rem; font-weight: 700; color: var(--navy); margin-bottom: 0.2rem; }

.resumen-precios { font-size: 0.82rem; color: var(--muted); }

.resumen-precios strong { color: var(--navy); }

.iva-note { font-size: 0.72rem; color: var(--muted); margin-top: 0.3rem; font-style: italic; display: none; }



/* CÓDIGO ASESOR */

.codigo-wrap {

margin-bottom: 1.2rem;

}

.codigo-input-wrap { position: relative; }

.codigo-input-wrap input {

padding-left: 2.4rem;

border-style: dashed;

}

.codigo-icon {

position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%);

font-size: 1rem; pointer-events: none;

}

.codigo-success {

font-size: 0.78rem; color: var(--green); font-weight: 600;

margin-top: 0.4rem; display: none;

padding: 0.4rem 0.7rem; background: var(--green-light);

border-radius: 6px; border: 1px solid #bbf7d0;

}



/* FACTURA TOGGLE */

.factura-label-row { margin-bottom: 0.6rem; }

.factura-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-bottom: 1rem; }



.toggle-btn {

padding: 0.9rem 0.7rem; border: 2px solid var(--border);

border-radius: 10px; background: var(--off);

cursor: pointer; text-align: center;

transition: all 0.2s; font-family: inherit;

}

.toggle-btn .icon { font-size: 1.3rem; display: block; margin-bottom: 0.3rem; }

.toggle-btn .lbl { font-size: 0.8rem; font-weight: 700; color: var(--text); display: block; line-height: 1.2; }

.toggle-btn .sub { font-size: 0.68rem; color: var(--muted); display: block; margin-top: 0.3rem; line-height: 1.3; }

.toggle-btn:hover { border-color: var(--navy); background: white; }



/* Tarifa Promocional = verde (por defecto) */

.toggle-btn.selected-promo { border-color: var(--green); background: var(--green-light); }

.toggle-btn.selected-promo .lbl { color: var(--green); }



/* Tarifa Corporativa = navy */

.toggle-btn.selected-corp { border-color: var(--navy); background: #eef1f8; }

.toggle-btn.selected-corp .lbl { color: var(--navy); }



/* FACTURA FIELDS */

.factura-fields {

background: var(--off); border: 1px solid var(--border);

border-radius: 10px; padding: 1.2rem;

display: none; animation: slideDown 0.25s ease;

}

.factura-fields.show { display: block; }



@keyframes slideDown {

from { opacity: 0; transform: translateY(-8px); }

to { opacity: 1; transform: translateY(0); }

}



.factura-section-label {

font-size: 0.72rem; font-weight: 700; color: var(--navy);

margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.08rem;

}



/* BUTTONS */

.nav-buttons {

display: flex; gap: 0.8rem; margin-top: 1.5rem;

padding-top: 1.2rem; border-top: 1px solid var(--border);

}



.btn-back {

padding: 0.75rem 1.2rem; border: 1.5px solid var(--border);

border-radius: 8px; background: none; color: var(--muted);

font-size: 0.85rem; font-weight: 600; cursor: pointer;

transition: all 0.15s; font-family: inherit;

}

.btn-back:hover { border-color: var(--navy); color: var(--navy); }



.btn-next {

flex: 1; padding: 0.85rem; background: var(--navy); color: white;

border: none; border-radius: 8px; font-size: 0.88rem; font-weight: 700;

cursor: pointer; transition: background 0.15s; font-family: inherit;

}

.btn-next:hover { background: var(--navy-mid); }



.btn-submit {

flex: 1; padding: 0.85rem; background: var(--red); color: white;

border: none; border-radius: 8px; font-size: 0.88rem; font-weight: 700;

cursor: pointer; transition: background 0.15s; font-family: inherit;

}

.btn-submit:hover { background: #c4251c; }



/* SUCCESS */

.success-screen { text-align: center; padding: 2.5rem 1rem; display: none; }

.success-icon {

width: 70px; height: 70px; background: var(--green-light);

border-radius: 50%; display: flex; align-items: center;

justify-content: center; font-size: 2rem;

margin: 0 auto 1.2rem; border: 2px solid #bbf7d0;

}

.success-screen h2 { font-size: 1.3rem; font-weight: 700; color: var(--navy); margin-bottom: 0.5rem; }

.success-screen p { color: var(--muted); font-size: 0.88rem; line-height: 1.6; max-width: 340px; margin: 0 auto 0.5rem; }

.success-plan {

display: inline-block; background: var(--navy); color: white;

padding: 0.4rem 1rem; border-radius: 20px;

font-size: 0.82rem; font-weight: 700; margin: 1rem 0;

}



.page { display: none; }

.page.active { display: block; }



@media (max-width: 480px) {

.card { padding: 1.4rem; }

.form-row { grid-template-columns: 1fr; }

.factura-toggle { grid-template-columns: 1fr; }

}

</style>

</head>

<body>



<div class="header">

<div class="logo-mark">MC<span>smart</span></div>

<h1>Contratar MCTags NFC</h1>

<p>Rellena el formulario y en menos de 24h te configuramos tus etiquetas y te las enviamos.</p>

<div class="card" id="mainCard">

<input type="email" id="neg_email" placeholder="info@tunegocio.com"/>

</div>



<div class="form-row">

<div class="form-group">

<input type="text" id="neg_ciudad" placeholder="Ej: Valencia"/>

<div class="error-msg" id="err_neg_ciudad">Introduce la ciudad</div>

<div class="form-group">

<select id="neg_tipo">

<option>Estudio de tatuajes</option>

<option>Peluquería / Barbería</option>

<option>Clínica
